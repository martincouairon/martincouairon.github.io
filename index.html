<!DOCTYPE html>
<html class="lang-fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Martin Couairon</title>
  <script>
    (function () {
      var saved = localStorage.getItem('lang') || (navigator.language.startsWith('fr') ? 'fr' : 'en');
      document.documentElement.className = 'lang-' + saved;
    })();
  </script>
  <style>html.lang-fr .en,html.lang-en .fr{display:none!important}</style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav>
    <span class="nav-brand">Martin Couairon</span>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="projects/index.html"><span class="fr">Projets</span><span class="en">Projects</span></a></li>
        <li><a href="cv.html">CV</a></li>
        <li><a href="about.html"><span class="fr">À propos</span><span class="en">About</span></a></li>
      </ul>
      <button id="lang-toggle" onclick="toggleLang()">EN</button>
    </div>
  </nav>

  <main>
    <div class="hero home-hero">
      <h1 class="hero-title">Martin Couairon</h1>
      <p class="hero-role fr">Auditeur financier senior · Paris</p>
      <p class="hero-role en">Senior Financial Auditor · Paris</p>
    </div>

    <section class="section">
      <div class="home-links">
        <a href="projects/index.html" class="home-link">
          <span><span class="fr">Projets</span><span class="en">Projects</span></span>
          <span class="home-link-arrow">→</span>
        </a>
        <a href="cv.html" class="home-link">
          <span>CV</span>
          <span class="home-link-arrow">→</span>
        </a>
        <a href="about.html" class="home-link">
          <span><span class="fr">À propos</span><span class="en">About</span></span>
          <span class="home-link-arrow">→</span>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <p>Martin Couairon &mdash; 2026</p>
  </footer>
  <script>
    function applyLang(lang) {
      document.documentElement.classList.remove('lang-fr', 'lang-en');
      document.documentElement.classList.add('lang-' + lang);
      var btn = document.getElementById('lang-toggle');
      if (btn) btn.textContent = lang === 'fr' ? 'EN' : 'FR';
      localStorage.setItem('lang', lang);
    }
    function toggleLang() {
      applyLang(localStorage.getItem('lang') === 'fr' ? 'en' : 'fr');
    }
    applyLang(localStorage.getItem('lang') || (navigator.language.startsWith('fr') ? 'fr' : 'en'));
  </script>
</body>
</html>
